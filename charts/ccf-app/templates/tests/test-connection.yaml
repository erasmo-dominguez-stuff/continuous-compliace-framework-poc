{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "ccf.fullname" . }}-test-connection
  labels:
    {{- include "ccf.componentLabels" (dict "ctx" . "component" "test") | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    # Keep the pod after a successful run so `helm test --logs` can read it;
    # it is recreated (and the old one removed) on the next test run.
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: connectivity
      image: {{ .Values.tests.image }}
      command:
        - sh
        - -c
        - |
          set -e
          {{- if .Values.api.enabled }}
          echo "Testing API at http://{{ include "ccf.api.fullname" . }}:{{ .Values.api.service.port }}/api/auth/publickey ..."
          curl -fsS -o /dev/null "http://{{ include "ccf.api.fullname" . }}:{{ .Values.api.service.port }}/api/auth/publickey"
          echo "API OK"
          {{- end }}
          {{- if .Values.ui.enabled }}
          echo "Testing UI at http://{{ include "ccf.ui.fullname" . }}:{{ .Values.ui.service.port }}/ ..."
          curl -fsS -o /dev/null "http://{{ include "ccf.ui.fullname" . }}:{{ .Values.ui.service.port }}/"
          echo "UI OK"
          {{- end }}
{{- end }}
