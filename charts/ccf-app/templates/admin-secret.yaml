{{- if and .Values.api.enabled .Values.api.adminUser.enabled (not .Values.api.adminUser.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ccf.api.fullname" . }}-admin
  labels:
    {{- include "ccf.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
type: Opaque
stringData:
  password: {{ required "api.adminUser.password is required when api.adminUser.enabled is true (or set api.adminUser.existingSecret). Provide it via --set-string / ADMIN_PASSWORD." .Values.api.adminUser.password | quote }}
{{- end }}
