{{- if .Values.ui.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccf.ui.fullname" . }}
  labels:
    {{- include "ccf.componentLabels" (dict "ctx" . "component" "ui") | nindent 4 }}
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "ccf.selectorLabels" (dict "ctx" . "component" "ui") | nindent 4 }}
{{- end }}
