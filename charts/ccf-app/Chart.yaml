apiVersion: v2
name: ccf-app
description: |
  Standard CCF control-plane chart: PostgreSQL datastore, central API (OSCAL
  reporting), and web UI. Includes migrations, admin bootstrap, optional OSCAL
  seed, metrics, PDB/HPA, ingress, and network policies. Pair with ccf-agent.
  See docs/components.md and https://continuouscompliance.io/
type: application
version: 0.1.0
# API image tag (ccf-app.api.image.tag defaults to this). Must be >= 0.13.0 for
# the agent's subject/risk-template upserts; 0.16.0 is the upstream known-good set.
appVersion: "0.16.0"
keywords:
  - compliance
  - oscal
  - security
  - governance
  - ccf
home: https://continuouscompliance.io/
sources:
  - https://github.com/compliance-framework/api
  - https://github.com/compliance-framework/ui
maintainers:
  - name: CCF deployment chart
