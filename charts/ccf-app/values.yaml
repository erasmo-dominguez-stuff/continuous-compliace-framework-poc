# Default values for ccf-app (PostgreSQL + API + UI).

# -- Override the chart name used in resource names.
nameOverride: ""
# -- Fully override the generated resource name prefix.
fullnameOverride: ""

# -- Extra labels merged into every rendered object.
commonLabels: {}

# -- Secrets used to pull images from private registries, e.g. [{name: regcred}]
# Also set global.imagePullSecrets on the umbrella chart for all subcharts.
imagePullSecrets: []

# Central image settings — change `registry` and tags for private mirrors (Artifactory, ACR, …).
images:
  registry: ghcr.io/compliance-framework
  pluginRegistry: ghcr.io/compliance-framework
  pullPolicy: IfNotPresent
  pullSecrets: []
  api:
    repository: api
    tag: ""
  ui:
    repository: ui
    tag: "2.9.1"
  postgres:
    repository: pg-ccf
    tag: "0.0.5"

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Pod/container security defaults applied to every component unless overridden.
podSecurityContext: {}
securityContext: {}

# Scheduling defaults applied to every component unless overridden per component.
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Cluster-wide hardening
# ---------------------------------------------------------------------------
networkPolicy:
  # -- Create NetworkPolicies for the components.
  enabled: false
  # -- Namespace where the ingress controller runs.
  ingressNamespace: ""
  # -- namespaceSelector matchLabels allowed to scrape API metrics (e.g. Alloy).
  monitoringNamespaceSelector: {}
    # kubernetes.io/metadata.name: observability
  # -- Extra `from` peers allowed to reach the API (raw NetworkPolicyPeer list).
  extraApiIngressFrom: []

# ---------------------------------------------------------------------------
# PostgreSQL datastore
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  auth:
    username: postgres
    # -- Database password. Change for any non-local deployment.
    password: postgres
    database: ccf
    # -- Existing Secret with keys POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB.
    existingSecret: ""
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 8Gi
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podSecurityContext: {}
  securityContext: {}

# ---------------------------------------------------------------------------
# API (central reporting service)
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  environment: production
  allowedOrigins: ""
  # Run `migrate up` as an init container so the DB schema exists before the API
  # starts. Required for login to work; disable only if you migrate externally.
  migrations:
    enabled: true
  # Bootstrap a default admin user for the UI via a post-install/upgrade Job
  # (idempotent: re-running does nothing if the user already exists). The
  # password lives in a Secret, never in the Job spec. Off by default; the local
  # overlay enables it for an out-of-the-box login.
  adminUser:
    enabled: false
    email: admin@ccf.local
    firstName: Admin
    lastName: User
    # -- Admin password. REQUIRED when enabled (unless existingSecret is set).
    # Provide it at install time (e.g. make ... ADMIN_PASSWORD=...) so it never
    # lands in git.
    password: ""
    # -- Optional existing Secret holding the password under key `password`.
    existingSecret: ""
  # Seed demo OSCAL data (a small "goodread" catalog + SSP + assessment plan +
  # results + POA&M) so the UI isn't empty on a fresh install. CCF starts with no
  # OSCAL content by design; without this the catalogs/plans/dashboards are empty.
  # Off by default; enable for demos (the files live in seed/oscal/ and are
  # mounted from a ConfigMap, then imported in dependency order via `/api oscal
  # import`). Idempotent enough for demos; re-running may create duplicates.
  seedData:
    enabled: false
  # Register an agent in Admin → Agents and create a service-account key for the
  # ccf-agent Deployment (populates the UI + wires CCF_API_AUTH_*). Requires
  # api.adminUser.enabled. Idempotent on upgrade.
  agentRegister:
    enabled: false
    name: ccf-kubernetes-agent
    keyName: default
    # Secret holding client_id / client_secret (created by the hook Job).
    secretName: ""
  database:
    driver: postgres
    sslmode: disable
    host: ""
    connection: ""
    # -- Existing Secret holding key CCF_DB_CONNECTION (required when
    # postgres.auth.existingSecret is set, unless `connection` is provided).
    existingSecret: ""
  jwtSecret: ""
  extraEnv: {}
  service:
    type: ClusterIP
    port: 8080
  containerPort: 8080
  metrics:
    enabled: true
    port: 9090
    path: /metrics
    service: true
  podAnnotations: {}
  pdb:
    enabled: true
    minAvailable: 1
  dataVolume:
    enabled: true
    size: 1Gi
  livenessProbe:
    httpGet:
      path: /api/auth/publickey
      port: http
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    httpGet:
      path: /api/auth/publickey
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
  resources: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: api
  podSecurityContext: {}
  securityContext: {}

# ---------------------------------------------------------------------------
# UI (web frontend)
# ---------------------------------------------------------------------------
ui:
  enabled: true
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  apiUrl: ""
  service:
    type: ClusterIP
    port: 80
  containerPort: 80
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
  podAnnotations: {}
  pdb:
    enabled: true
    minAvailable: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/component: ui
  podSecurityContext: {}
  securityContext: {}

# ---------------------------------------------------------------------------
# Helm tests (`helm test`) - in-cluster connectivity checks for API/UI.
# ---------------------------------------------------------------------------
tests:
  enabled: true
  image: curlimages/curl:8.11.1

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  tls: []
  uiHost: ""
  apiHost: ""
