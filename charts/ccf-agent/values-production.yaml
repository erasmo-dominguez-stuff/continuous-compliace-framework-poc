# Production values for ccf-agent.
#
# Deploy standalone:
#   helm upgrade --install ccf-agent . -n ccf \
#     -f values-production.yaml -f ../../values/plugins/github.yaml \
#     --set-string config.plugins.github_repos.config.token="$GITHUB_TOKEN"
#
# See docs/production.md and docs/policies-and-plugins.md.

apiUrl: "http://ccf-api:8080"

replicaCount: 1
# Production typically runs one agent scheduler per cluster/namespace estate.
# Deploy additional agent releases (different plugins/namespaces) rather than
# scaling this Deployment beyond 1 — duplicate schedulers would duplicate scans.

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop: ["ALL"]

config:
  daemon: true
  verbosity: 1
  plugins: {}
    # Layer plugin overlays from values/plugins/ at install time.
    # The agent fails to start if plugins is empty.

# Optional API authentication when the API requires client credentials:
# extraEnv:
#   - name: CCF_API_AUTH_CLIENT_ID
#     valueFrom:
#       secretKeyRef:
#         name: ccf-agent-api-auth
#         key: client_id
#   - name: CCF_API_AUTH_CLIENT_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: ccf-agent-api-auth
#         key: client_secret
