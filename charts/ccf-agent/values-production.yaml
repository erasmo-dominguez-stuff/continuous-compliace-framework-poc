# Production values for ccf-agent.

# CHANGE-ME: the API endpoint this agent reports to.
apiUrl: "http://ccf-api.ccf.svc.cluster.local:8080"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

# CHANGE-ME: configure the plugins/policies relevant to your estate.
config:
  daemon: true
  verbosity: 1
  plugins: {}
