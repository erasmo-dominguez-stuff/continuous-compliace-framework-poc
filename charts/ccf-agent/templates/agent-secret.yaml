{{- $apiUrl := include "ccf-agent.apiUrl" . -}}
{{- $config := mergeOverwrite (deepCopy .Values.config) (dict "api" (dict "url" $apiUrl)) -}}
{{- /*
Rendered as a Secret (not a ConfigMap) because the agent config can carry
plugin credentials (e.g. a GitHub token under plugins.<name>.config.token).
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ccf-agent.fullname" . }}
  labels:
    {{- include "ccf-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yml: |
    {{- toYaml $config | nindent 4 }}
