apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ccf-agent.fullname" . }}
  labels:
    {{- include "ccf-agent.labels" . | nindent 4 }}
  {{- if .Values.auth.waitForRegistration }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "7"
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ccf-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ccf-agent.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/agent-secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with include "ccf-agent.imagePullSecrets" . }}
      imagePullSecrets:
        {{- . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "ccf-agent.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: agent
          image: {{ include "ccf-agent.image.ref" (dict "root" . "image" .Values.image) | quote }}
          imagePullPolicy: {{ include "ccf-agent.image.pullPolicy" (dict "root" . "image" .Values.image) }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/ccf
              readOnly: true
            - name: cache
              mountPath: /tmp
            # Writable workdir where the agent unpacks plugins/policies.
            # Required when securityContext.readOnlyRootFilesystem is enabled.
            - name: ccf-data
              mountPath: /app/.compliance-framework
      volumes:
        - name: config
          secret:
            secretName: {{ include "ccf-agent.fullname" . }}
        - name: cache
          emptyDir: {}
        - name: ccf-data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
