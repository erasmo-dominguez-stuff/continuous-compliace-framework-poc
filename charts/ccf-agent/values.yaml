# Default values for ccf-agent.

nameOverride: ""
fullnameOverride: ""
commonLabels: {}
imagePullSecrets: []

images:
  registry: ghcr.io/compliance-framework
  pluginRegistry: ghcr.io/compliance-framework
  pullPolicy: IfNotPresent
  pullSecrets: []
  agent:
    repository: agent
    tag: "0.7.1"

image:
  repository: ""
  tag: ""
  pullPolicy: ""

auth:
  # When true, the agent Deployment is a post-install hook (weight 7) so it starts
  # after ccf-app.api.agentRegister creates the auth Secret (weight 6).
  waitForRegistration: false

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# -- URL of the CCF API the agent reports to. Defaults to the in-cluster
# ccf-app API Service name. Override when the API lives elsewhere.
apiUrl: "http://ccf-api:8080"

# -- Command/args for the agent container. The image's binary is `concom`
# (working dir /app); the `agent` subcommand reads the config mounted at
# /etc/ccf/config.yml.
command:
  - ./concom
args:
  - agent
  - -c
  - /etc/ccf/config.yml

# -- Agent configuration rendered to /etc/ccf/config.yml.
# api.url is injected from .Values.apiUrl when left empty here.
# Configure plugins under config.plugins — layer overlays from values/plugins/
# (local-ssh.yaml, github.yaml, custom-policies.yaml). See values/plugins/README.md.
config:
  daemon: true
  verbosity: 2
  api:
    url: ""
  plugins: {}
    # ssh:
    #   source: ghcr.io/compliance-framework/plugin-local-ssh:v0.2.0
    #   policies:
    #     - ghcr.io/compliance-framework/plugin-local-ssh-policies:v0.2.0
    #   labels:
    #     group: public

# -- Extra environment variables for the agent container (list form).
# Only api.auth.client_id/client_secret are reliably overridable via env
# (CCF_API_AUTH_CLIENT_ID / CCF_API_AUTH_CLIENT_SECRET).
extraEnv: []
  # - name: CCF_API_AUTH_CLIENT_SECRET
  #   valueFrom:
  #     secretKeyRef:
  #       name: ccf-agent-auth
  #       key: client_secret

# -- Extra envFrom sources (ConfigMap/Secret refs) for the agent container.
extraEnvFrom: []
  # - secretRef:
  #     name: ccf-agent-extra-env

podAnnotations: {}

pdb:
  enabled: false
  minAvailable: 1

# The agent image is distroless (no shell). Probes are off by default; the
# scheduler is monitored via logs/heartbeats in the API. Do not use exec+sh probes.
livenessProbe: {}
readinessProbe: {}

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
podSecurityContext: {}
securityContext: {}
