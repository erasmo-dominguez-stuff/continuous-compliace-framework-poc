# Custom Rego policies for the GitHub plugin (layer AFTER values/plugins/github.yaml).
#
# 1. Author & test:  make policy
# 2. Push bundle:     make policy-push POLICY_IMAGE=ghcr.io/you/ccf-custom-policies:v0.1.0 ...
# 3. Set POLICY_IMAGE below, then:
#    PLUGIN_VALUES="values/plugins/github.yaml values/plugins/custom-policies.yaml"
#
# Helm replaces arrays on merge — this file lists the FULL policies[] (upstream + yours).

ccf-agent:
  config:
    plugins:
      github_repos:
        policies:
          - ghcr.io/compliance-framework/plugin-github-repositories-policies:v0.7.0
          - ghcr.io/your-org/ccf-custom-policies:v0.1.0   # CHANGE-ME after policy-push
        policy_data:
          allow_public_repositories: false
