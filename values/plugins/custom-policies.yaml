# Reusable overlay: add your OWN custom policies to a plugin.
#
# CCF policies are Rego bundles distributed over OCI. Author them under
# policies/, then build and push a bundle:
#
#   make policy-test                       # unit-test the Rego
#   make policy-push \                      # build + push to your registry
#     POLICY_IMAGE=ghcr.io/<your-org>/ccf-custom-policies:v0.1.0 \
#     GHCR_USER=<user> GHCR_TOKEN=$GHCR_TOKEN
#
# Then layer this overlay so the agent pulls BOTH the upstream policies and your
# custom bundle for the GitHub plugin (maps deep-merge, so this combines with
# values/plugins/github.yaml):
#
#   make up PLUGIN_VALUES="values/plugins/github.yaml values/plugins/custom-policies.yaml" \
#     GITHUB_TOKEN=$GITHUB_TOKEN GITHUB_ORG=<your-org>
#
# Swap the image/plugin below for your own. `policy_data` is optional extra data
# passed to the policies (the example policy uses it to allow-list public repos).

ccf-agent:
  config:
    plugins:
      github_repos:
        source: ghcr.io/compliance-framework/plugin-github-repositories:v0.8.1
        policies:
          # Upstream policy bundle (keep if you still want the stock checks).
          - ghcr.io/compliance-framework/plugin-github-repositories-policies:v0.7.0
          # Your custom bundle (built/pushed from policies/). Update the ref.
          - ghcr.io/your-org/ccf-custom-policies:v0.1.0
        # Optional data made available to the policies as `data.custom.*`.
        policy_data:
          allow_public_repositories: false
