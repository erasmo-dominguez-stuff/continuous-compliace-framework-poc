# Local SSH hardening plugin (demo — needs sshd on the target host, not inside K8s pods).
ccf-agent:
  config:
    plugins:
      local-ssh:
        schedule: "*/10 * * * *"
        source: ghcr.io/compliance-framework/plugin-local-ssh:v0.3.0
        policies:
          - ghcr.io/compliance-framework/plugin-local-ssh-policies:v0.3.1
        labels:
          group: local
