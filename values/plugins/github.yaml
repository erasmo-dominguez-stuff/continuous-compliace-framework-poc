# GitHub organisation plugin — inject token/org at install time (never commit secrets).
#
#   make prod ADMIN_PASSWORD='...' GITHUB_TOKEN='...' GITHUB_ORG='your-org'
#   make up PLUGIN_VALUES=values/plugins/github.yaml GITHUB_TOKEN='...' GITHUB_ORG='...'
#
# Token: read-only PAT or fine-grained with Actions, Administration, Contents,
# Metadata, Pull requests, Secret scanning (see CCF plugin docs).

ccf-agent:
  config:
    plugins:
      github_repos:
        schedule: "*/30 * * * *"
        source: ghcr.io/compliance-framework/plugin-github-repositories:v0.8.1
        policies:
          - ghcr.io/compliance-framework/plugin-github-repositories-policies:v0.7.0
        labels:
          provider: github
        config:
          organization: ""
          token: ""
