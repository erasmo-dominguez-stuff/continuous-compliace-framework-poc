# Local overlay — Docker Desktop Kubernetes.
# Usage: make up && make pf
# Login: admin@ccf.local / Admin12345!

ccf-app:
  enabled: true
  fullnameOverride: ccf
  postgres:
    persistence:
      enabled: false
    resources:
      requests: { cpu: 50m, memory: 128Mi }
  api:
    environment: local
    allowedOrigins: "http://localhost:8000,http://localhost:3000"
    replicaCount: 2
    metrics:
      enabled: true
    pdb:
      enabled: true
      minAvailable: 1
    adminUser:
      enabled: true
      email: admin@ccf.local
      firstName: Admin
      lastName: User
      password: "Admin12345!"
    seedData:
      enabled: true
    agentRegister:
      enabled: true
      name: ccf-kubernetes-agent
    resources:
      requests: { cpu: 50m, memory: 128Mi }
  ui:
    apiUrl: "http://localhost:8080"
    replicaCount: 2
    pdb:
      enabled: true
      minAvailable: 1
    resources:
      requests: { cpu: 25m, memory: 64Mi }
  ingress:
    enabled: false
  networkPolicy:
    enabled: false

ccf-agent:
  enabled: true
  fullnameOverride: ccf-agent
  apiUrl: "http://ccf-api:8080"
  extraEnv:
    - name: CCF_API_AUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_id
    - name: CCF_API_AUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_secret
  auth:
    waitForRegistration: true
  resources:
    requests: { cpu: 25m, memory: 64Mi }
