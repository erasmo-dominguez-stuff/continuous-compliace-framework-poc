# Local environment overlay (kind / Docker Desktop Kubernetes).
#
# Environment config only (resources, persistence, access). Plugins live in
# values/plugins/ and are layered on top so they can be reused across
# environments:
#
#   helm dependency build .
#   helm upgrade --install ccf . -n ccf --create-namespace \
#     -f values/local.yaml -f values/plugins/local-ssh.yaml
#   # or simply: make up
#
# Disables persistence and trims resources for laptops.

ccf-app:
  enabled: true
  fullnameOverride: ccf
  postgres:
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  api:
    environment: local
    allowedOrigins: "http://localhost:8000,http://localhost:3000"
    metrics:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
  ui:
    apiUrl: "http://localhost:8080"
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
  ingress:
    enabled: false
  networkPolicy:
    enabled: false

ccf-agent:
  enabled: true
  fullnameOverride: ccf-agent
  apiUrl: "http://ccf-api:8080"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
