# Production overlay — HA control plane, ingress, network policies.
# Usage:
#   make prod ADMIN_PASSWORD='...' GITHUB_TOKEN='...' GITHUB_ORG='your-org'
# See docs/production.md for required Kubernetes Secrets.

ccf-app:
  enabled: true
  fullnameOverride: ccf
  postgres:
    enabled: true
    auth:
      existingSecret: ccf-postgres-credentials
      username: ccf
      database: ccf
    persistence:
      enabled: true
      storageClass: ""
      size: 20Gi
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    podSecurityContext:
      fsGroup: 999
      runAsNonRoot: true
      seccompProfile: { type: RuntimeDefault }
    securityContext:
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }
  api:
    replicaCount: 2
    environment: production
    migrations:
      enabled: true
    adminUser:
      enabled: true
      email: admin@your-org.example
      firstName: Admin
      lastName: User
      password: ""
    seedData:
      enabled: false
    agentRegister:
      enabled: true
      name: ccf-kubernetes-agent
    database:
      sslmode: require
      existingSecret: ccf-db-connection
    metrics:
      enabled: true
      service: true
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 75
    pdb:
      enabled: true
      minAvailable: 1
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      fsGroup: 65532
      seccompProfile: { type: RuntimeDefault }
    securityContext:
      allowPrivilegeEscalation: false
      capabilities: { drop: ["ALL"] }
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: api
  ui:
    replicaCount: 2
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { cpu: 250m, memory: 128Mi }
    pdb:
      enabled: true
      minAvailable: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: ui
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    uiHost: ccf.example.com
    apiHost: api.ccf.example.com
    tls:
      - hosts: [ccf.example.com, api.ccf.example.com]
        secretName: ccf-tls
  networkPolicy:
    enabled: true
    ingressNamespace: ingress-nginx
    monitoringNamespaceSelector:
      kubernetes.io/metadata.name: observability
  tests:
    enabled: true

ccf-agent:
  enabled: true
  fullnameOverride: ccf-agent
  apiUrl: "http://ccf-api:8080"
  replicaCount: 1
  extraEnv:
    - name: CCF_API_AUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_id
    - name: CCF_API_AUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_secret
  auth:
    waitForRegistration: true
  config:
    daemon: true
    verbosity: 1
  pdb:
    enabled: true
    minAvailable: 1
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    fsGroup: 65532
    seccompProfile: { type: RuntimeDefault }
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities: { drop: ["ALL"] }
