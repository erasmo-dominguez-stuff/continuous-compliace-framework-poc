# AKS smoke-test overlay — minimal config to validate the stack on Azure.
# Usage:
#   az aks get-credentials --resource-group <rg> --name <aks>
#   make aks ADMIN_PASSWORD='<strong-pw>'
#   make pf-aks

ccf-app:
  enabled: true
  fullnameOverride: ccf
  postgres:
    persistence:
      enabled: true
      storageClass: managed-csi
      size: 8Gi
    podSecurityContext:
      fsGroup: 999
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: "1", memory: 1Gi }
  api:
    environment: local
    allowedOrigins: "http://localhost:8000,http://localhost:3000"
    replicaCount: 1
    metrics:
      enabled: true
    adminUser:
      enabled: true
      email: admin@ccf.local
      firstName: Admin
      lastName: User
      password: ""              # inject: make aks ADMIN_PASSWORD='...'
    seedData:
      enabled: true
    agentRegister:
      enabled: true
      name: ccf-kubernetes-agent
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits: { cpu: "1", memory: 512Mi }
  ui:
    apiUrl: "http://localhost:8080"
    replicaCount: 1
    resources:
      requests: { cpu: 25m, memory: 64Mi }
      limits: { cpu: 250m, memory: 128Mi }
  ingress:
    enabled: false
  networkPolicy:
    enabled: false

ccf-agent:
  enabled: true
  fullnameOverride: ccf-agent
  apiUrl: "http://ccf-api:8080"
  extraEnv:
    - name: CCF_API_AUTH_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_id
    - name: CCF_API_AUTH_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: ccf-agent-auth
          key: client_secret
  auth:
    waitForRegistration: true
  resources:
    requests: { cpu: 25m, memory: 64Mi }
    limits: { cpu: 250m, memory: 256Mi }
