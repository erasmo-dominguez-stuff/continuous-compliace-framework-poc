apiVersion: v2
name: ccf
description: |
  Standard Kubernetes package for the Continuous Compliance Framework (CCF).
  Production-ready defaults: HA API/UI, PDBs, HPA, network policies, metrics,
  observability hooks, and hardened agent. Composes ccf-app (PostgreSQL + API +
  UI) and ccf-agent (plugin scheduler). Layer values/production.yaml for prod.
  See docs/production.md and https://continuouscompliance.io/
type: application
version: 0.1.0
# Tracks the pinned API release (ccf-app Chart appVersion). Agent 0.7.x needs API >= 0.13.
appVersion: "0.16.0"
keywords:
  - compliance
  - oscal
  - security
  - governance
  - ccf
home: https://continuouscompliance.io/
sources:
  - https://github.com/compliance-framework
dependencies:
  - name: ccf-app
    version: "0.1.0"
    repository: "file://charts/ccf-app"
    condition: ccf-app.enabled
  - name: ccf-agent
    version: "0.1.0"
    repository: "file://charts/ccf-agent"
    condition: ccf-agent.enabled
  # Optional: the official Bitnami PostgreSQL chart, for a reliable / fault
  # tolerant datastore (persistence, PDB, metrics, and primary+read-replica
  # streaming replication via architecture: replication). Disabled by default;
  # the lightweight built-in StatefulSet (ccf-app.postgres) is used otherwise.
  # Enabled by values/postgres-ha.yaml. See that overlay + the README.
  - name: postgresql
    version: "18.7.3"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
maintainers:
  - name: CCF deployment chart
