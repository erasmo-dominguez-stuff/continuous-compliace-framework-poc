apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ccf-alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ccf
  # Multi-source: the Alloy chart comes from the Grafana helm repo while its
  # values live in this git repo.
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: 1.9.0
      helm:
        releaseName: ccf-alloy
        valueFiles:
          - $values/ccf/observability/alloy-values.yaml
    - repoURL: https://github.com/erasmo-dominguez-stuff/2026.git
      # CHANGE-ME: branch/tag to track.
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
