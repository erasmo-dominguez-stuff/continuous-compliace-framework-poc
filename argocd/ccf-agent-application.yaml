apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ccf-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: ccf
  source:
    repoURL: https://github.com/erasmo-dominguez-stuff/2026.git
    # CHANGE-ME: branch/tag to track.
    targetRevision: main
    path: ccf/charts/ccf-agent
    helm:
      releaseName: ccf-agent
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ccf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
